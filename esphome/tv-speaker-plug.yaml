# https://templates.blakadder.com/gosund_UP111.html

substitutions:
  devicename: tv-speaker-plug
  upper_devicename: TV Speaker Plug

# https://esphome.io/components/esphome/
esphome:
  name: ${devicename}
  friendly_name: ${upper_devicename}
  comment: TV Speaker Plug
  area: Living Room

# https://esphome.io/components/wifi/
wifi:
  # https://esphome.io/components/esphome/#changing-esphome-node-name
  # to rename, add the OLD name, rename + install, remove, install again
  # use_address: plug7.local
  min_auth_mode: WPA2
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
    - ssid: !secret backup_wifi
      password: !secret backup_wifi_password
  ap:
    ssid: "esphome_${devicename}"
    password: !secret backup_wifi_password

# https://esphome.io/components/esp8266/
esp8266:
  board: esp01_1m

# https://esphome.io/components/captive_portal/
captive_portal:

# https://esphome.io/components/api/
api:

# https://esphome.io/components/ota/
ota:
  - platform: esphome
    password: !secret ota_password

# https://esphome.io/components/time/
time:
  - platform: homeassistant
    id: homeassistant_time

# https://esphome.io/components/logger/
logger:
  level: WARN

# https://esphome.io/components/binary_sensor/
binary_sensor:
  - platform: gpio
    id: button
    pin:
      number: GPIO3
      inverted: False
    on_press:
      - switch.toggle: relay

# https://esphome.io/components/switch/
switch:
  - platform: gpio
    name: "Power"
    id: relay
    pin: GPIO14
    on_turn_on:
      - switch.toggle: ledblue
    on_turn_off:
      - switch.toggle: ledblue
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: ledblue
    pin: GPIO1
    inverted: True
    restore_mode: ALWAYS_ON

# https://esphome.io/components/sensor/
sensor:
  # https://esphome.io/components/sensor/wifi_signal/
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
  # https://esphome.io/components/sensor/hlw8012/
  - platform: hlw8012
    sel_pin:
      number: GPIO12
      inverted: True
    cf_pin: GPIO04
    cf1_pin: GPIO5
    power:
      name: "Wattage"
      unit_of_measurement: W
      id: wattage
      accuracy_decimals: 0
      filters:
        - calibrate_linear: # Map sensor -> true value
            - 238 -> 42
            - 4820 -> 845
    current:
      name: "Amperage"
      unit_of_measurement: A
      id: current
      accuracy_decimals: 1
      filters:
        - calibrate_linear: # Map sensor -> true value
            - 0.23014 -> 0.180
            - 4.08463 -> 3.420
    voltage:
      name: "Voltage"
      unit_of_measurement: V
      id: voltage
      accuracy_decimals: 0
      filters:
        - calibrate_linear: # Map sensor -> true value
            - 609.7 -> 245.4
            - 614.7 -> 247.0
    change_mode_every: 3
    update_interval: 3s
  # https://esphome.io/components/sensor/total_daily_energy/
  - platform: total_daily_energy
    name: "Total Daily Energy"
    power_id: wattage
    filters:
      - multiply: 0.001
    unit_of_measurement: kWh
