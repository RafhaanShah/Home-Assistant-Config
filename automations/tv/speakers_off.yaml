alias: "TV: Speakers Off"
description: "When TV turns off, if speakers are on, turn off"
trigger:
  platform: state
  entity_id: media_player.living_room_tv
  to: "off"
  for:
    seconds: 15
condition:
  - condition: state
    entity_id: switch.tv_speaker
    state: "on"
action:
  - service: switch.turn_off
    data:
      entity_id: switch.tv_speaker
