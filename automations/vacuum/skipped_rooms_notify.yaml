id: vacuum_skipped_rooms_notify
alias: "Vacuum: Skipped Rooms Notify"
description: >
  On dock, flag any room that was requested this run but never stamped since the
  run started (e.g. door closed so the robot never entered it).
mode: parallel
max: 3
trigger:
  - platform: state
    entity_id: vacuum.dreamevac
    to: docked
    for:
      minutes: 10
    id: docked
  - platform: state
    entity_id: person.raf
    to: home
    id: raf_home
  - platform: state
    entity_id: person.lynn
    to: home
    id: lynn_home
  - platform: state
    entity_id: vacuum.dreamevac
    to: cleaning
    id: cleaning_started
action:
  - variables:
      action_clean_due: "{{ 'VACUUM_CLEAN_DUE_ROOMS_' ~ context.id }}"
      notification_tag: vacuum-skipped-rooms
      run_start_ts: "{{ state_attr('input_datetime.vacuum_run_started', 'timestamp') }}"
      requested_areas: "{{ states('input_text.vacuum_cleaning_areas') | from_json(default=[]) }}"
      skipped: >
        {% set ns = namespace(skip=[]) %}
        {% for aid in requested_areas %}
          {% set name = area_name(aid) %}
          {% set dt = state_attr('sensor.vacuum_rooms', 'rooms')
                      | selectattr('area', 'eq', name)
                      | map(attribute='last_cleaned') | first %}
          {% set ts = state_attr(dt, 'timestamp') %}
          {% if ts is none or ts < run_start_ts %}
            {% set ns.skip = ns.skip + [name] %}
          {% endif %}
        {% endfor %}
        {{ ns.skip }}
  - choose:
      - conditions:
          - condition: trigger
            id: cleaning_started
        sequence:
          - service: notify.mobile_app_rafs_phone
            data:
              message: clear_notification
              data:
                tag: "{{ notification_tag }}"
          - service: notify.mobile_app_lynns_phone
            data:
              message: clear_notification
              data:
                tag: "{{ notification_tag }}"
      - conditions:
          - condition: trigger
            id: docked
        sequence:
          - if:
              - condition: template
                value_template: "{{ (skipped | count) > 0 }}"
            then:
              - if:
                  - condition: template
                    value_template: >
                      {{ is_state('person.raf', 'home') or is_state('person.lynn', 'home') }}
                then:
                  - if:
                      - condition: state
                        entity_id: person.raf
                        state: home
                    then:
                      - service: notify.mobile_app_rafs_phone
                        data:
                          title: "Vacuum skipped rooms"
                          message: "{{ skipped | join(', ') }} (door closed?)"
                          data:
                            tag: "{{ notification_tag }}"
                            notification_icon: mdi:robot-vacuum-alert
                            actions:
                              - action: "{{ action_clean_due }}"
                                title: "Clean Due Rooms"
                  - if:
                      - condition: state
                        entity_id: person.lynn
                        state: home
                    then:
                      - service: notify.mobile_app_lynns_phone
                        data:
                          title: "Vacuum skipped rooms"
                          message: "{{ skipped | join(', ') }} (door closed?)"
                          data:
                            tag: "{{ notification_tag }}"
                            notification_icon: mdi:robot-vacuum-alert
                            actions:
                              - action: "{{ action_clean_due }}"
                                title: "Clean Due Rooms"
                  - service: input_text.set_value
                    target:
                      entity_id: input_text.vacuum_cleaning_areas
                    data:
                      value: ""
                  - wait_for_trigger:
                      - platform: event
                        event_type: mobile_app_notification_action
                        event_data:
                          action: "{{ action_clean_due }}"
                    timeout:
                      hours: 2
                    continue_on_timeout: false
                  - service: script.vacuum_clean_due_rooms
                else:
                  - stop: "Skipped rooms pending until someone gets home"
            else:
              - service: input_text.set_value
                target:
                  entity_id: input_text.vacuum_cleaning_areas
                data:
                  value: ""
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: raf_home
              - condition: trigger
                id: lynn_home
          - condition: template
            value_template: "{{ (skipped | count) > 0 }}"
        sequence:
          - if:
              - condition: state
                entity_id: person.raf
                state: home
            then:
              - service: notify.mobile_app_rafs_phone
                data:
                  title: "Vacuum skipped rooms"
                  message: "{{ skipped | join(', ') }} (door closed?)"
                  data:
                    tag: "{{ notification_tag }}"
                    notification_icon: mdi:robot-vacuum-alert
                    actions:
                      - action: "{{ action_clean_due }}"
                        title: "Clean Due Rooms"
          - if:
              - condition: state
                entity_id: person.lynn
                state: home
            then:
              - service: notify.mobile_app_lynns_phone
                data:
                  title: "Vacuum skipped rooms"
                  message: "{{ skipped | join(', ') }} (door closed?)"
                  data:
                    tag: "{{ notification_tag }}"
                    notification_icon: mdi:robot-vacuum-alert
                    actions:
                      - action: "{{ action_clean_due }}"
                        title: "Clean Due Rooms"
          - service: input_text.set_value
            target:
              entity_id: input_text.vacuum_cleaning_areas
            data:
              value: ""
          - wait_for_trigger:
              - platform: event
                event_type: mobile_app_notification_action
                event_data:
                  action: "{{ action_clean_due }}"
            timeout:
              hours: 2
            continue_on_timeout: false
          - service: script.vacuum_clean_due_rooms
