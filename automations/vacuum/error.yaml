id: vacuum_error
alias: "Vacuum: Error"
description: "When Vacuum has an error state, send a notification"
trigger:
  platform: state
  entity_id: vacuum.robovac
  to: "error"
  for:
    minutes: 5
action:
  - service: notify.send_message
    data:
      entity_id: notify.telegram_raf
      message: "Vacuum has an error"
