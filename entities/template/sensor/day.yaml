# https://www.home-assistant.io/integrations/template#sensor
sensor:
  - name: Day of Week
    state: "{{ ['Monday','Tuesday','Wednesday','Thursday',
      'Friday','Saturday','Sunday'][strptime(states('sensor.date'), '%Y-%m-%d').weekday()] }}"
  - name: Month
    state: "{{ ['January','February','March','April','May','June',
      'July','August','September','October','November','December']
      [strptime(states('sensor.date'), '%Y-%m-%d').month-1] }}"
  - name: Day of Month
    state: >
      {{- strptime(states('sensor.date'), '%Y-%m-%d').day | int }}
